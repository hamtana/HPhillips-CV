name: CI

on:
  push:
    branches: [ "release" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy CV to docs folder
        run: |
          mkdir -p docs
          cp -f ./PDF/HPhillips-CV-WebSafe.pdf ./docs/

      - name: Generate mobile-friendly index.html
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Hamish Phillips – CV</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: sans-serif; background: #f4f4f4; }

              /* Mobile: show download prompt */
              .mobile-view {
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 2rem;
                text-align: center;
                gap: 1rem;
              }
              .mobile-view h1 { font-size: 1.5rem; color: #004f90; }
              .mobile-view p { color: #555; font-size: 0.95rem; }
              .btn {
                display: inline-block;
                margin-top: 1rem;
                padding: 0.8rem 2rem;
                background: #004f90;
                color: white;
                border-radius: 6px;
                text-decoration: none;
                font-size: 1rem;
              }

              /* Desktop: show embedded PDF */
              .desktop-view {
                display: flex;
                width: 100%;
                height: 100vh;
              }
              iframe {
                width: 100%;
                height: 100%;
                border: none;
              }

              @media (max-width: 768px) {
                .mobile-view { display: flex; }
                .desktop-view { display: none; }
              }
            </style>
          </head>
          <body>
            <div class="mobile-view">
              <h1>Hamish Phillips</h1>
              <p>Software Engineer &amp; Musician</p>
              <p>Tap below to view or download my CV.</p>
              <a class="btn" href="HPhillips-CV-WebSafe.pdf" target="_blank">View / Download CV (PDF)</a>
            </div>
            <div class="desktop-view">
              <iframe src="HPhillips-CV-WebSafe.pdf"></iframe>
            </div>
          </body>
          </html>
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/HPhillips-CV-WebSafe.pdf docs/index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Update CV in docs folder [$(date +'%Y-%m-%d %H:%M:%S')]"

      - name: Push changes
        run: git push
